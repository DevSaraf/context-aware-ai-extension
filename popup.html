<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 320px;
            min-height: 280px;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #262624 0%, #1e1e1c 100%);
            color: #e8e6e1;
            padding: 24px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #c6613f 0%, #a34e30 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
            color: #c6613f;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 12px;
            color: #6a6960;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: #9a9890;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #3a3a38;
            border-radius: 8px;
            background: #1a1a18;
            color: #e8e6e1;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #c6613f;
            background: #262624;
            box-shadow: 0 0 0 3px rgba(198, 97, 63, 0.15);
        }

        input::placeholder {
            color: #4a4940;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-family: inherit;
        }

        button.primary {
            background: linear-gradient(135deg, #c6613f 0%, #a34e30 100%);
            color: #fff;
        }

        button.primary:hover {
            background: linear-gradient(135deg, #d4734f 0%, #b55a3a 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(198, 97, 63, 0.3);
        }

        button.primary:active {
            transform: translateY(0);
        }

        button.secondary {
            background: #2e2e2c;
            border: 1px solid #3a3a38;
            color: #9a9890;
        }

        button.secondary:hover {
            border-color: #4a4940;
            color: #e8e6e1;
        }

        button.danger {
            background: linear-gradient(135deg, #d9534f 0%, #c9302c 100%);
            color: #fff;
        }

        button.danger:hover {
            background: linear-gradient(135deg, #c9302c 0%, #ac2925 100%);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: rgba(217, 83, 79, 0.1);
            border: 1px solid rgba(217, 83, 79, 0.2);
            color: #d9534f;
            font-size: 12px;
            padding: 10px 12px;
            border-radius: 6px;
            margin-top: 12px;
        }

        .success {
            background: rgba(92, 184, 92, 0.1);
            border: 1px solid rgba(92, 184, 92, 0.2);
            color: #5cb85c;
            font-size: 12px;
            padding: 10px 12px;
            border-radius: 6px;
            margin-top: 12px;
        }

        .logged-in {
            text-align: center;
        }

        .user-avatar {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #c6613f 0%, #a34e30 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        .user-email {
            font-size: 15px;
            font-weight: 500;
            color: #e8e6e1;
            margin-bottom: 4px;
        }

        .user-company {
            font-size: 13px;
            color: #6a6960;
            margin-bottom: 24px;
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #6a6960;
        }

        .toggle-link a {
            color: #c6613f;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .toggle-link a:hover {
            text-decoration: underline;
            color: #d4734f;
        }

        .hidden {
            display: none;
        }

        .divider {
            height: 1px;
            background: #3a3a38;
            margin: 16px 0;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="login-form">
        <div class="header">
            <div class="logo">K</div>
            <div>
                <h1>KRAB</h1>
                <p class="subtitle">Login to continue</p>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="you@company.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter your password">
        </div>

        <button id="login-btn" class="primary">Login</button>

        <div id="login-error" class="error hidden"></div>

        <div class="toggle-link">
            Don't have an account? <a id="show-register">Create one</a>
        </div>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
        <div class="header">
            <div class="logo">K</div>
            <div>
                <h1>KRAB</h1>
                <p class="subtitle">Create your account</p>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="register-email" placeholder="you@company.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="register-password" placeholder="Create a password">
        </div>

        <div class="form-group">
            <label>Company ID</label>
            <input type="text" id="register-company" placeholder="your-company">
        </div>

        <button id="register-btn" class="primary">Create Account</button>

        <div id="register-error" class="error hidden"></div>
        <div id="register-success" class="success hidden"></div>

        <div class="toggle-link">
            Already have an account? <a id="show-login">Login</a>
        </div>
    </div>

    <!-- Logged In View -->
    <div id="logged-in" class="hidden logged-in">
        <div class="user-avatar" id="user-avatar-icon">U</div>

        <p class="user-email" id="user-email"></p>
        <p class="user-company" id="user-company"></p>

        <div class="btn-group">
            <button id="copy-token-btn" class="secondary">Copy Token (Debug)</button>
            <button id="logout-btn" class="danger">Logout</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
