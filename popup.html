<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 320px;
            min-height: 280px;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #262624;
            color: #e8e6e1;
            padding: 24px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .logo {
            width: 42px;
            height: 42px;
            background: rgba(198, 97, 63, 0.15);
            border: 1px solid rgba(198, 97, 63, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo svg {
            width: 22px;
            height: 22px;
            color: #c6613f;
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
            color: #c6613f;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 12px;
            color: #6a6960;
            margin-top: 2px;
        }

        /* ── Form Elements ── */
        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #9a9890;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #333331;
            border-radius: 8px;
            background: #1e1e1c;
            color: #e8e6e1;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #c6613f;
            background: #2a2a28;
            box-shadow: 0 0 0 3px rgba(198, 97, 63, 0.1);
        }

        input::placeholder {
            color: #4a4940;
        }

        /* ── Buttons ── */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
        }

        button.primary {
            background: #c6613f;
            color: #fff;
        }

        button.primary:hover {
            background: #d4734f;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(198, 97, 63, 0.3);
        }

        button.primary:active {
            transform: translateY(0);
            box-shadow: none;
        }

        button.secondary {
            background: #1e1e1c;
            border: 1px solid #333331;
            color: #9a9890;
        }

        button.secondary:hover {
            border-color: #4a4940;
            color: #e8e6e1;
        }

        button.danger {
            background: rgba(217, 83, 79, 0.15);
            border: 1px solid rgba(217, 83, 79, 0.3);
            color: #d9534f;
        }

        button.danger:hover {
            background: rgba(217, 83, 79, 0.25);
            border-color: rgba(217, 83, 79, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ── Feedback Messages ── */
        .error {
            background: rgba(217, 83, 79, 0.1);
            border: 1px solid rgba(217, 83, 79, 0.2);
            color: #d9534f;
            font-size: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 12px;
        }

        .success {
            background: rgba(92, 184, 92, 0.1);
            border: 1px solid rgba(92, 184, 92, 0.2);
            color: #5cb85c;
            font-size: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 12px;
        }

        /* ── Logged-In View ── */
        .logged-in {
            text-align: center;
        }

        .user-avatar {
            width: 64px;
            height: 64px;
            background: rgba(198, 97, 63, 0.15);
            border: 2px solid rgba(198, 97, 63, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 20px;
            font-weight: 700;
            color: #c6613f;
            letter-spacing: 1px;
        }

        .user-email {
            font-size: 14px;
            font-weight: 500;
            color: #e8e6e1;
            margin-bottom: 4px;
        }

        .user-company {
            font-size: 12px;
            color: #6a6960;
            margin-bottom: 24px;
        }

        /* ── Toggle Link ── */
        .toggle-link {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #6a6960;
        }

        .toggle-link a {
            color: #c6613f;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-link a:hover {
            text-decoration: underline;
            color: #d4734f;
        }

        .hidden {
            display: none;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: #333331;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="login-form">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    <line x1="9" y1="7" x2="15" y2="7"/>
                    <line x1="9" y1="11" x2="15" y2="11"/>
                </svg>
            </div>
            <div>
                <h1>KRAB</h1>
                <p class="subtitle">Login to continue</p>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="you@company.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter your password">
        </div>

        <button id="login-btn" class="primary">Login</button>

        <div id="login-error" class="error hidden"></div>

        <div class="toggle-link">
            Don't have an account? <a id="show-register">Create one</a>
        </div>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="8.5" cy="7" r="4"/>
                    <line x1="20" y1="8" x2="20" y2="14"/>
                    <line x1="23" y1="11" x2="17" y2="11"/>
                </svg>
            </div>
            <div>
                <h1>KRAB</h1>
                <p class="subtitle">Create your account</p>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="register-email" placeholder="you@company.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="register-password" placeholder="Create a password">
        </div>

        <div class="form-group">
            <label>Company ID</label>
            <input type="text" id="register-company" placeholder="your-company">
        </div>

        <button id="register-btn" class="primary">Create Account</button>

        <div id="register-error" class="error hidden"></div>
        <div id="register-success" class="success hidden"></div>

        <div class="toggle-link">
            Already have an account? <a id="show-login">Login</a>
        </div>
    </div>

    <!-- Logged In View -->
    <div id="logged-in" class="hidden logged-in">
        <div class="user-avatar">
            <span id="user-avatar-icon"></span>
        </div>

        <p class="user-email" id="user-email"></p>
        <p class="user-company" id="user-company"></p>

        <div class="btn-group">
            <button id="copy-token-btn" class="secondary">Copy Token (Debug)</button>
            <button id="logout-btn" class="danger">Logout</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
