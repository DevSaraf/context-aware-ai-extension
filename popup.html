<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 320px;
            min-height: 200px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #4a9eff;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #4a9eff;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #3a8eef;
        }

        button.secondary {
            background: transparent;
            border: 1px solid #444;
            color: #888;
        }

        button.secondary:hover {
            border-color: #666;
            color: #fff;
        }

        button.danger {
            background: #dc3545;
        }

        button.danger:hover {
            background: #c82333;
        }

        .error {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 10px;
        }

        .success {
            color: #51cf66;
            font-size: 12px;
            margin-top: 10px;
        }

        .logged-in {
            text-align: center;
        }

        .logged-in .email {
            font-size: 14px;
            color: #4a9eff;
            margin-bottom: 5px;
        }

        .logged-in .company {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
        }

        .toggle-link {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }

        .toggle-link a {
            color: #4a9eff;
            cursor: pointer;
            text-decoration: none;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="login-form">
        <h1>Context Assistant</h1>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="you@company.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter password">
        </div>

        <button id="login-btn">Login</button>

        <div id="login-error" class="error hidden"></div>

        <div class="toggle-link">
            Don't have an account? <a id="show-register">Register</a>
        </div>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
        <h1>Create Account</h1>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="register-email" placeholder="you@company.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="register-password" placeholder="Create password">
        </div>

        <div class="form-group">
            <label>Company ID</label>
            <input type="text" id="register-company" placeholder="your-company">
        </div>

        <button id="register-btn">Create Account</button>

        <div id="register-error" class="error hidden"></div>
        <div id="register-success" class="success hidden"></div>

        <div class="toggle-link">
            Already have an account? <a id="show-login">Login</a>
        </div>
    </div>

    <!-- Logged In View -->
    <div id="logged-in" class="hidden logged-in">
        <h1>Context Assistant</h1>

        <p class="email" id="user-email"></p>
        <p class="company" id="user-company"></p>

        <button id="logout-btn" class="danger">Logout</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
