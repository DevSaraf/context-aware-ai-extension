<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 320px;
            min-height: 280px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #fff;
            padding: 24px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg {
            width: 22px;
            height: 22px;
            color: #fff;
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .subtitle {
            font-size: 12px;
            color: #666;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #222;
        }

        input::placeholder {
            color: #555;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        button.primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
        }

        button.primary:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transform: translateY(-1px);
        }

        button.primary:active {
            transform: translateY(0);
        }

        button.secondary {
            background: #222;
            border: 1px solid #333;
            color: #888;
        }

        button.secondary:hover {
            border-color: #444;
            color: #fff;
        }

        button.danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: #fff;
        }

        button.danger:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            font-size: 12px;
            padding: 10px 12px;
            border-radius: 6px;
            margin-top: 12px;
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #22c55e;
            font-size: 12px;
            padding: 10px 12px;
            border-radius: 6px;
            margin-top: 12px;
        }

        .logged-in {
            text-align: center;
        }

        .user-avatar {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .user-avatar svg {
            width: 32px;
            height: 32px;
            color: #fff;
        }

        .user-email {
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 4px;
        }

        .user-company {
            font-size: 13px;
            color: #666;
            margin-bottom: 24px;
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }

        .toggle-link a {
            color: #3b82f6;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .divider {
            height: 1px;
            background: #2a2a2a;
            margin: 16px 0;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="login-form">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
            </div>
            <div>
                <h1>Context Assistant</h1>
                <p class="subtitle">Login to continue</p>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="you@company.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter your password">
        </div>

        <button id="login-btn" class="primary">Login</button>

        <div id="login-error" class="error hidden"></div>

        <div class="toggle-link">
            Don't have an account? <a id="show-register">Create one</a>
        </div>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
            </div>
            <div>
                <h1>Create Account</h1>
                <p class="subtitle">Join Context Assistant</p>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="register-email" placeholder="you@company.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="register-password" placeholder="Create a password">
        </div>

        <div class="form-group">
            <label>Company ID</label>
            <input type="text" id="register-company" placeholder="your-company">
        </div>

        <button id="register-btn" class="primary">Create Account</button>

        <div id="register-error" class="error hidden"></div>
        <div id="register-success" class="success hidden"></div>

        <div class="toggle-link">
            Already have an account? <a id="show-login">Login</a>
        </div>
    </div>

    <!-- Logged In View -->
    <div id="logged-in" class="hidden logged-in">
        <div class="user-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </div>

        <p class="user-email" id="user-email"></p>
        <p class="user-company" id="user-company"></p>

        <div class="btn-group">
            <button id="copy-token-btn" class="secondary">Copy Token (Debug)</button>
            <button id="logout-btn" class="danger">Logout</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
